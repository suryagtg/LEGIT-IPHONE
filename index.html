<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensi Pro Tool</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="app-container">
        <h2>Sensi Pro Tool iOS</h2>
        <p>Optimalkan pengaturan layar untuk mempermudah bidikan.</p>
        
        <label for="game-type">Pilih Tipe Senjata:</label>
        <select id="game-type">
            <option value="shotgun">Shotgun (Jarak Dekat)</option>
            <option value="smg">SMG (Jarak Menengah)</option>
            <option value="rifle">Assault Rifle (Jarak Jauh)</option>
        </select>

        <button onclick="hitungSensi()">Dapatkan Rekomendasi</button>

        <div id="hasil" class="hasil-box" style="display:none;">
            <h3>Rekomendasi Sensitivitas:</h3>
            <p id="sensi-lihat">Lihat Sekeliling: -</p>
            <p id="sensi-reddot">Red Dot Sight: -</p>
            <p id="tips-trik"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
